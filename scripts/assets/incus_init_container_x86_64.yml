config: {}
cluster: null
networks:
- config:
    bridge.mtu: "1460"
    ipv4.address: auto
    ipv6.address: auto
  description: "Incus network for x86_64"
  name: incusbr0
  type: bridge
  project: default
storage_pools:
- config: {}
  description: "Incus storage pool for x86_64"
  name: default
  driver: dir
profiles:
- config:
    security.syscalls.deny_default: "false"
    security.nesting: "true"
  description: "Incus default profile for x86_64"
  devices:
    eth0:
      name: eth0
      nictype: bridged
      parent: incusbr0
      type: nic
    root:
      path: /
      pool: default
      type: disk
  name: default

